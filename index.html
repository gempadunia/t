<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Gempa Bumi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LeafletJS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Moment.js for robust date/time handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/locale/id.js"></script>

    <!-- html2canvas for High-Res Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            transition: padding 0.3s ease;
        }
        
        /* Container laporan utama - Menyudut */
        #report-container {
            position: relative;
            width: 100%;
            height: 950px; 
            overflow: hidden;
            border-radius: 0; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        #map { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 2rem;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .form-label {
            @apply block text-sm font-medium text-gray-700 mb-1;
        }
        .form-input {
            @apply mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500;
        }

        .detail-label {
            @apply text-gray-500 text-sm font-bold uppercase tracking-wider mb-0.5;
        }
        .detail-value-primary {
            @apply text-gray-900 text-lg font-medium leading-tight;
        }
        .detail-value-secondary {
            @apply text-gray-600 text-base font-normal;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 transition-all duration-300">

    <!-- PAGE 1: Input Page -->
    <div id="page1" class="w-full max-w-lg mx-auto flex flex-col gap-8">
        
        <!-- Input Gempa BMKG via Text XML -->
        <div class="bg-white p-6 sm:p-8 rounded-2xl border border-gray-200 shadow-xl">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Input Data Gempa BMKG (XML)</h1>
            <form id="bmkgXmlForm" class="space-y-4">
                <div>
                    <label for="xmlData" class="form-label">Tempel Data XML BMKG</label>
                    <textarea id="xmlData" name="xmlData" rows="6" class="form-input font-mono text-xs" placeholder="<gempa>&#10; <waktu>2026/03/04 07:27:06.790</waktu>&#10; <lintang>-2.43</lintang>&#10; <bujur>140.46</bujur>&#10; <dalam>10</dalam>&#10; <mag>2.9</mag>&#10; <area>Near North Coast of West Papua</area>&#10;</gempa>"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="bmkg_tsunami" class="form-label">Potensi Tsunami</label>
                        <select id="bmkg_tsunami" name="bmkg_tsunami" class="form-input">
                            <option>Tidak Berpotensi Tsunami</option>
                            <option>BERPOTENSI TSUNAMI</option>
                        </select>
                    </div>
                    <div>
                        <label for="bmkg_guncangan" class="form-label">Guncangan (MMI)</label>
                        <select id="bmkg_guncangan" name="bmkg_guncangan" class="form-input">
                            <option>I</option> <option>II-III</option> <option>IV</option>
                            <option>V</option> <option>VI</option> <option>VII</option>
                            <option>VIII</option> <option>IX</option> <option>X+</option>
                        </select>
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-transform transform hover:scale-105">
                        Visualisasikan Data BMKG
                    </button>
                </div>
            </form>
        </div>

        <!-- Input Gempa Manual -->
        <div class="bg-white p-6 sm:p-8 rounded-2xl border border-gray-200 shadow-xl">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Input Gempa Manual (CSV)</h1>
            <form id="manualGempaForm" class="space-y-4">
                <div>
                    <label for="csvData" class="form-label">Data Gempa (mag,kedalaman,waktu,lat,long,lokasi)</label>
                    <textarea id="csvData" name="csvData" rows="3" class="form-input" placeholder="mag,kedalaman,waktu,lat,long,lokasi&#10;5.4,10.0,2024-09-24T16:54:00,-7.5,110.5,&quot;135 km BaratDaya Semarang&quot;"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="manual_tsunami" class="form-label">Potensi Tsunami</label>
                        <select id="manual_tsunami" name="tsunami" class="form-input">
                            <option>Tidak Berpotensi Tsunami</option>
                            <option>BERPOTENSI TSUNAMI</option>
                        </select>
                    </div>
                    <div>
                        <label for="manual_guncangan" class="form-label">Guncangan (MMI)</label>
                        <select id="manual_guncangan" name="guncangan" class="form-input">
                            <option>I</option> <option>II-III</option> <option>IV</option>
                            <option>V</option> <option>VI</option> <option>VII</option>
                            <option>VIII</option> <option>IX</option> <option>X+</option>
                        </select>
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-transform transform hover:scale-105">
                        Submit Gempa Manual
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- PAGE 2: DISPLAY INFO -->
    <div id="page2" class="hidden w-full md:max-w-3xl mx-auto space-y-6 transition-all duration-300">
        <div id="report-container" class="bg-white">
            <!-- Peta Backdrop -->
            <div id="map"></div>
            
            <!-- Logo Custom -->
            <img src="logo.png" id="export-logo" alt="Logo" crossorigin="anonymous" style="position: absolute; bottom: 130px; left: 25px; z-index: 5; width: 72px; height: 72px;" onerror="this.style.display='none'">

            <!-- Overlay Komposisi -->
            <div class="content-overlay">
                <!-- Header -->
                <header class="glass-panel p-5 mb-4 text-center">
                    <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-800 tracking-tight">Informasi Gempa Terkini</h2>
                    <p class="text-sm sm:text-lg text-gray-500 font-medium">@gempa.dunia</p>
                </header>

                <div class="flex-grow"></div>

                <!-- Main Info Section -->
                <div class="grid grid-cols-1 md:grid-cols-[1.0fr_3.0fr] gap-5 items-stretch">
                    <div id="magnitude-container" class="glass-panel flex flex-col items-center justify-center p-6 text-center">
                        <h3 class="font-bold text-lg uppercase tracking-widest opacity-80">Magnitudo</h3>
                        <p id="display-magnitude" class="text-[100px] font-black leading-none py-2">0.0</p>
                    </div>
                    
                    <div class="glass-panel p-7">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-6">
                            <div class="flex items-start space-x-4">
                                <div class="bg-gray-100 p-2 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                </div>
                                <div>
                                    <h4 class="detail-label">Waktu</h4>
                                    <p id="display-waktu" class="detail-value-primary"></p>
                                </div>
                            </div>
                            <div class="flex items-start space-x-4">
                                <div class="bg-gray-100 p-2 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 12.343l-3.535 3.536m-2.829-2.829l-3.535 3.536m-2.121-2.121L3 17.25m18-10.5L3 6.75m18 0l-3.535 3.536" /></svg>
                                </div>
                                <div>
                                    <h4 class="detail-label">Kedalaman</h4>
                                    <p id="display-kedalaman" class="detail-value-primary"></p>
                                </div>
                            </div>
                            <div class="flex items-start space-x-4">
                                <div class="bg-gray-100 p-2 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                </div>
                                <div>
                                    <h4 class="detail-label">Lokasi</h4>
                                    <p id="display-koordinat" class="detail-value-secondary mb-1"></p>
                                    <p id="display-detailLokasi" class="detail-value-primary"></p>
                                </div>
                            </div>
                            <div class="flex items-start space-x-4">
                                <div class="bg-gray-100 p-2 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                                </div>
                                <div>
                                    <h4 class="detail-label">Estimasi Guncangan</h4>
                                    <p id="display-guncangan" class="detail-value-primary"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tsunami Banner -->
                <div class="mt-5 pointer-events-auto">
                    <p id="display-tsunami" class="w-full font-black text-3xl p-5 rounded-2xl text-center shadow-xl uppercase tracking-widest"></p>
                </div>
            </div>
        </div>
        
        <!-- Narasi & Action Buttons -->
        <div class="space-y-4 px-2 mt-4">
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-lg">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-xl text-gray-800">Narasi Gempabumi</h3>
                    <button id="salin-btn" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-1.5 px-4 rounded-full transition-all shadow-md">
                        Salin Narasi
                    </button>
                </div>
                <pre id="narasi-gempa" class="whitespace-pre-wrap text-sm text-gray-700 font-sans bg-gray-50 p-4 rounded-xl border border-gray-100"></pre>
            </div>

            <!-- Tombol Fit Layar (Memfokuskan Viewport) -->
            <div class="flex flex-col sm:flex-row flex-wrap justify-center gap-4 pb-12">
                <button id="toggle-width-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-xl transition-all hover:scale-105 order-1 sm:order-none">
                    Fit Layar (Fokus Peta)
                </button>
                <button id="export-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition-all hover:scale-105 order-2 sm:order-none">
                    Export ke JPG (300 PPI)
                </button>
                <button id="back-btn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition-all hover:scale-105 order-3 sm:order-none">
                    Kembali ke Form
                </button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            moment.locale('id');

            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const bmkgXmlForm = document.getElementById('bmkgXmlForm');
            const manualGempaForm = document.getElementById('manualGempaForm');
            const backBtn = document.getElementById('back-btn');
            const salinBtn = document.getElementById('salin-btn');
            const exportBtn = document.getElementById('export-btn');
            const toggleWidthBtn = document.getElementById('toggle-width-btn');
            const narasiDisplay = document.getElementById('narasi-gempa');
            
            // Peta Setup
            const map = L.map('map', { 
                zoomControl: false,
                attributionControl: false,
                fadeAnimation: false 
            }).setView([-2.548926, 118.0148634], 5);
            
            L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 16,
                crossOrigin: true 
            }).addTo(map);

            L.control.attribution({position: 'bottomright'}).addAttribution('ESRI').addTo(map);

            const epicenterIconSVG = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="56" height="56">
                    <circle cx="50" cy="50" r="42" fill="#ff0000" stroke="#fff" stroke-width="5" opacity="0.95"/>
                    <path d="M25,50 h10 l5,-15 l10,30 l10,-30 l5,15 h10" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>`;
            
            const epicenterIcon = L.divIcon({
                html: epicenterIconSVG,
                className: '',
                iconSize: [56, 56],
                iconAnchor: [28, 28]
            });

            let marker = L.marker([0, 0], { icon: epicenterIcon }).addTo(map);
            let circles = [
                L.circle([0, 0], { radius: 0, color: '#ff0000', weight: 2, fillColor: '#f03', fillOpacity: 0.2 }),
                L.circle([0, 0], { radius: 0, color: '#ff0000', weight: 1.5, fillColor: '#f03', fillOpacity: 0.12 }),
                L.circle([0, 0], { radius: 0, color: '#ff0000', weight: 1, fillColor: '#f03', fillOpacity: 0.04 })
            ];
            circles.forEach(c => c.addTo(map));

            const guncanganColors = {
                'I':      { bg: 'rgba(255, 255, 255, 0.96)', text: 'text-black' },
                'II-III': { bg: 'rgba(193, 218, 255, 0.96)', text: 'text-black' },
                'IV':     { bg: 'rgba(87, 247, 255, 0.96)', text: 'text-black' },
                'V':      { bg: 'rgba(149, 255, 163, 0.96)', text: 'text-black' },
                'VI':     { bg: 'rgba(252, 235, 5, 0.96)',   text: 'text-black' },
                'VII':    { bg: 'rgba(255, 180, 1, 0.96)',   text: 'text-white' },
                'VIII':   { bg: 'rgba(255, 111, 1, 0.96)',   text: 'text-white' },
                'IX':     { bg: 'rgba(255, 1, 9, 0.96)',     text: 'text-white' },
                'X+':     { bg: 'rgba(186, 0, 0, 0.96)',     text: 'text-white' },
            };
            
            function formatWaktu(isoString, format = 'narasi') {
                if (!isoString) return 'Waktu Tidak Valid';
                
                let wibMoment;
                
                if (isoString.includes('T') && isoString.includes('Z')) {
                   wibMoment = moment(isoString).utcOffset('+07:00');
                } else if (isoString.includes('/')) {
                   wibMoment = moment.utc(isoString, "YYYY/MM/DD HH:mm:ss.SSS").utcOffset('+07:00');
                } else {
                   wibMoment = moment(isoString);
                }

                if (!wibMoment.isValid()) return 'Waktu Tidak Valid';
                
                if (format === 'tampilan') {
                    return `<span class="whitespace-nowrap">${wibMoment.format('DD MMMM YYYY')}</span><br><span class="text-gray-500 font-normal whitespace-nowrap">${wibMoment.format('HH:mm:ss')} WIB</span>`;
                } else {
                    return wibMoment.format('DD MMMM YYYY HH:mm:ss') + ' WIB';
                }
            }

            function getCurrentWIBTime() {
                return moment().utcOffset('+07:00').format('DD/MM/YYYY HH:mm');
            }
            
            function generateNarasi(data, isBmkg = false) {
                const publishedTime = getCurrentWIBTime();
                const source = isBmkg ? "BMKG" : "?";

                return `M${parseFloat(data.magnitude).toFixed(1)}
[PARAMETER AWAL]
Kedalaman = ${data.kedalaman} Kilometer
Lokasi = ${data.detailLokasi}
Waktu = ${formatWaktu(data.waktu, 'narasi')}
Sumber Gempa = ${source}
Guncangan Maksimum = ${data.guncangan} MMI
Potensi Tsunami = ${data.tsunami}
Estimasi Korban = ?
Perkiraan Kerugian = ?
Rincian Guncangan Gempa (dalam MMI) = 
Belum Tersedia

Data Oleh ${source}
Dipublikasikan pada ${publishedTime} WIB`;
            }

            function getRadiusByMagnitude(mag) {
                if (mag < 1) return [3000, 6000, 15000];
                if (mag < 4) return [5000, 10000, 20000];
                if (mag < 6) return [15000, 30000, 60000];
                if (mag < 7) return [30000, 60000, 120000];
                if (mag < 8) return [60000, 120000, 200000];
                return [150000, 300000, 600000];
            }
            
            function displayGempa(data, isBmkg = false) {
                document.getElementById('display-magnitude').textContent = parseFloat(data.magnitude).toFixed(1);
                document.getElementById('display-kedalaman').textContent = `${data.kedalaman} Km`;
                document.getElementById('display-waktu').innerHTML = formatWaktu(data.waktu, 'tampilan');
                
                const latStr = `${Math.abs(data.lat)}${data.lat >= 0 ? 'LU' : 'LS'}`;
                const lngStr = `${Math.abs(data.lng)}${data.lng >= 0 ? 'BT' : 'BB'}`;
                document.getElementById('display-koordinat').textContent = `${latStr}-${lngStr}`;
                
                document.getElementById('display-detailLokasi').textContent = data.detailLokasi;
                document.getElementById('display-guncangan').textContent = `${data.guncangan} MMI`;
                                
                const tsunamiDisplay = document.getElementById('display-tsunami');
                tsunamiDisplay.textContent = data.tsunami;
                tsunamiDisplay.style.backgroundColor = (data.tsunami === 'BERPOTENSI TSUNAMI') ? '#991b1b' : '#15803d';
                tsunamiDisplay.style.color = '#ffffff';
                
                const magnitudeContainer = document.getElementById('magnitude-container');
                const colors = guncanganColors[data.guncangan] || { bg: 'rgba(220, 220, 220, 0.96)', text: 'text-black' };
                magnitudeContainer.style.backgroundColor = colors.bg;
                                
                const magTextElements = magnitudeContainer.querySelectorAll('h3, p');
                magTextElements.forEach(el => {
                    el.classList.remove('text-white', 'text-black');
                    el.classList.add(colors.text);
                });
                
                narasiDisplay.textContent = generateNarasi(data, isBmkg);
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
                
                setTimeout(() => {
                    map.invalidateSize();
                    const targetLatLng = [data.lat, data.lng];
                    map.setView(targetLatLng, 7);
                    marker.setLatLng(targetLatLng);
                    const radii = getRadiusByMagnitude(data.magnitude);
                    circles.forEach((circle, index) => {
                        circle.setLatLng(targetLatLng);
                        circle.setRadius(radii[index]);
                    });
                                        
                    let maxRadius = Math.max(...radii);
                    let zoomLevel = 11 - Math.log(maxRadius / 1000) / Math.log(2);
                    map.setView(targetLatLng, Math.max(5, Math.min(13, Math.round(zoomLevel))));
                }, 200);
            }

            // LOGIKA FIT VIEW MENGGUNAKAN VISUAL SCALE (Sempurna untuk Mode Desktop Mobile)
            let isFitView = false;
            toggleWidthBtn.addEventListener('click', () => {
                const page2Container = document.getElementById('page2');
                
                if (!isFitView) {
                    // Hilangkan padding body agar bisa menempel secara penuh ke ujung pinggiran layar
                    document.body.classList.remove('p-4');
                    document.body.classList.add('p-0');
                    
                    // Trigger reflow/recalculate di browser
                    void document.body.offsetWidth;
                    
                    // Hitung rasio zoom agar lebar visual container menyamai full layout window (cth 980px)
                    const screenWidth = window.innerWidth;
                    const containerWidth = page2Container.offsetWidth; 
                    const scaleRatio = screenWidth / containerWidth;
                    
                    // Terapkan fungsi CSS transform untuk melakukan ZOOM secara visual 
                    // tanpa merusak proporsi lebar asli (width tidak berubah)
                    page2Container.style.transformOrigin = 'top center';
                    page2Container.style.transform = `scale(${scaleRatio})`;
                    
                    // Karena konten membesar secara visual, tambahkan ruang ekstra ke bawah
                    // supaya user tetap bisa scrolling sampai tombol fitur selesai/ekspor terbaca penuh
                    const addedHeight = page2Container.offsetHeight * (scaleRatio - 1);
                    page2Container.style.marginBottom = addedHeight + 'px';
                    
                    document.body.style.overflowX = 'hidden'; // Menghindari pergeseran ke samping

                    // Langsung auto-scroll ke bagian paling atas peta
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                    toggleWidthBtn.textContent = 'Kembalikan View';
                    toggleWidthBtn.classList.replace('bg-indigo-600', 'bg-orange-600');
                    toggleWidthBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-orange-700');
                    isFitView = true;
                } else {
                    // Kembalikan ke mode normal
                    document.body.classList.add('p-4');
                    document.body.classList.remove('p-0');
                    
                    page2Container.style.transform = 'none';
                    page2Container.style.marginBottom = '0px';
                    document.body.style.overflowX = 'auto';

                    toggleWidthBtn.textContent = 'Fit Layar (Fokus Peta)';
                    toggleWidthBtn.classList.replace('bg-orange-600', 'bg-indigo-600');
                    toggleWidthBtn.classList.replace('hover:bg-orange-700', 'hover:bg-indigo-700');
                    isFitView = false;
                }
                
                // Beri tahu Leaflet bahwa ada pergerakan / zooming
                setTimeout(() => {
                    map.invalidateSize();
                }, 350); 
            });

            bmkgXmlForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const xmlString = document.getElementById('xmlData').value.trim();
                
                if (!xmlString) {
                    alert('Harap masukkan data XML BMKG.');
                    return;
                }

                try {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                    
                    if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                        throw new Error("Format XML tidak valid.");
                    }

                    const getVal = (tag) => {
                        const el = xmlDoc.getElementsByTagName(tag)[0];
                        return el ? el.textContent : '';
                    };

                    const mag = parseFloat(getVal("mag"));
                    const waktu = getVal("waktu");
                    const lintang = parseFloat(getVal("lintang"));
                    const bujur = parseFloat(getVal("bujur"));
                    const dalam = getVal("dalam").replace(/km/i, '').trim();
                    const area = getVal("area");

                    if (isNaN(mag) || isNaN(lintang) || isNaN(bujur) || !waktu || !area) {
                         throw new Error("Data XML tidak lengkap. Pastikan tag <mag>, <waktu>, <lintang>, <bujur>, <dalam>, dan <area> ada.");
                    }

                    const dataVisualisasi = {
                        magnitude: mag,
                        kedalaman: parseFloat(dalam),
                        waktu: waktu,
                        lat: lintang,
                        lng: bujur,
                        detailLokasi: area,
                        tsunami: document.getElementById('bmkg_tsunami').value,
                        guncangan: document.getElementById('bmkg_guncangan').value
                    };

                    displayGempa(dataVisualisasi, true); 

                } catch (error) {
                    console.error("XML Parse Error:", error);
                    alert("Terjadi kesalahan saat memproses XML:\n" + error.message);
                }
            });

            // LOGIKA PERBAIKAN: PARSING INPUT GEMPA MANUAL (CSV)
            manualGempaForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(manualGempaForm);
                const rawDataText = formData.get('csvData').trim();
                
                // Pisahkan berdasarkan baris baru, abaikan baris yang kosong
                const csvLines = rawDataText.split('\n').filter(line => line.trim() !== '');
                if (csvLines.length === 0) return;
                
                // Ambil baris paling terakhir (berisi data angka) untuk mengabaikan teks Header
                const lastLine = csvLines[csvLines.length - 1].trim(); 
                
                // Pisahkan menggunakan koma (lebih aman jika lokasi menggunakan koma tapi tidak diapit tanda kutip)
                const parts = lastLine.split(',');
                
                if (parts.length < 6) {
                    alert('Format CSV tidak valid. Pastikan minimal ada 6 kolom yang dipisahkan koma (mag,kedalaman,waktu,lat,long,lokasi)');
                    return;
                }
                
                const data = {
                    magnitude: parseFloat(parts[0].trim()),
                    kedalaman: parseFloat(parts[1].trim()),
                    waktu: parts[2].trim(), 
                    lat: parseFloat(parts[3].trim()),
                    lng: parseFloat(parts[4].trim()),
                    // Gabungkan sisa index ke-5 ke atas menjadi satu string untuk field lokasi
                    detailLokasi: parts.slice(5).join(',').replace(/"/g, '').trim(), 
                    tsunami: formData.get('tsunami'),
                    guncangan: formData.get('guncangan')
                };

                // Validasi tambahan agar tidak lolos saat membaca teks Header
                if (isNaN(data.magnitude) || isNaN(data.lat) || isNaN(data.lng)) {
                    alert("Data tidak valid. Pastikan Anda memasukkan urutan angka pada baris terakhir (bukan menyalin teks header/huruf).");
                    return;
                }

                displayGempa(data, false); 
            });
                        
            backBtn.addEventListener('click', () => {
                page2.classList.add('hidden');
                page1.classList.remove('hidden');
                
                // Pastikan untuk mereset fungsi zoom kembali normal saat klik Kembali ke form
                if (isFitView) {
                    isFitView = false;
                    document.body.classList.add('p-4');
                    document.body.classList.remove('p-0');
                    const page2Container = document.getElementById('page2');
                    page2Container.style.transform = 'none';
                    page2Container.style.marginBottom = '0px';
                    document.body.style.overflowX = 'auto';
                    toggleWidthBtn.textContent = 'Fit Layar (Fokus Peta)';
                    toggleWidthBtn.classList.replace('bg-orange-600', 'bg-indigo-600');
                    toggleWidthBtn.classList.replace('hover:bg-orange-700', 'hover:bg-indigo-700');
                }
            });
            
            salinBtn.addEventListener('click', () => {
                const narasiText = narasiDisplay.textContent;
                const textArea = document.createElement('textarea');
                textArea.value = narasiText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                const originalText = salinBtn.textContent;
                salinBtn.textContent = 'Tersalin!';
                salinBtn.disabled = true;
                setTimeout(() => {
                    salinBtn.textContent = originalText;
                    salinBtn.disabled = false;
                }, 2000);
            });
            
            exportBtn.addEventListener('click', () => {
                const reportElement = document.getElementById('report-container');
                const page2Container = document.getElementById('page2');
                const originalText = exportBtn.textContent;
                exportBtn.textContent = "Mengekspor...";
                exportBtn.disabled = true;
                
                // SANGAT PENTING: Kita perlu mematikan visual scale ini sejenak
                // agar html2canvas dapat mendownload gambar resolusi aslinya yang tidak rusak/terpotong
                const wasFitView = isFitView;
                if (wasFitView) {
                    page2Container.style.transform = 'none';
                    page2Container.style.marginBottom = '0px';
                }

                const scale = 3.125;
                
                setTimeout(() => {
                    html2canvas(reportElement, {
                        scale: scale,
                        useCORS: true, 
                        allowTaint: false,
                        backgroundColor: "#ffffff",
                        logging: false,
                        scrollX: 0,
                        scrollY: -window.scrollY
                    }).then(canvas => {
                        // Nyalakan kembali fit view layarnya
                        if (wasFitView) {
                            const screenWidth = window.innerWidth;
                            const containerWidth = page2Container.offsetWidth; 
                            const scaleRatio = screenWidth / containerWidth;
                            page2Container.style.transform = `scale(${scaleRatio})`;
                            const addedHeight = page2Container.offsetHeight * (scaleRatio - 1);
                            page2Container.style.marginBottom = addedHeight + 'px';
                        }

                        try {
                            const link = document.createElement('a');
                            const timestamp = moment().format('YYYYMMDD_HHmmss');
                            link.download = `Laporan_Gempa_${timestamp}.jpg`;
                            link.href = canvas.toDataURL('image/jpeg', 0.95);
                            link.click();
                        } catch (e) {
                            console.error("Gagal membuat data gambar:", e);
                            alert("Ekspor gagal karena masalah keamanan gambar eksternal (CORS).");
                        }
                        exportBtn.textContent = originalText;
                        exportBtn.disabled = false;
                    }).catch(err => {
                        console.error("Export Error:", err);
                        exportBtn.textContent = "Gagal Mengekspor";
                        exportBtn.disabled = false;
                    });
                }, 500); // Tunggu setengah detik supaya render kembali utuh sejenak 
            });
        });
    </script>
</body>
